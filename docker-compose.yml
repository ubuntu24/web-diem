services:
  redis:
    image: redis:7-alpine
    container_name: web-diem-redis
    profiles: [ "local-redis" ]
    command: [ "redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru" ]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-network
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
        reservations:
          cpus: '0.10'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web-diem-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - EXTRA_TRUSTED_HOSTS=${EXTRA_TRUSTED_HOSTS:-localhost,127.0.0.1}
    volumes:
      # Removed students.db as Supabase Postgres is used
      - ./backend/static:/app/static
    networks:
      - backend-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8000
    container_name: web-diem-frontend
    expose:
      - "3000"
    env_file:
      - ./frontend/.env
    environment:
      - API_URL=http://backend:8000
      - NODE_ENV=production
      - DOCKER_ENV=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    env_file:
      - .env.tunnel
    command: tunnel --no-autoupdate run
    networks:
      - frontend-network
      - backend-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge

volumes:
  redis-data:
