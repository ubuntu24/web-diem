name: WEB DIEM

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env files
        run: |
          echo "$FRONTEND_ENV" > frontend/.env
          echo "$BACKEND_ENV" > backend/.env
          # 🚀 CLEAN & EXTRACT TOKEN
          CLEAN_TOKEN=$(echo "$CF_TOKEN" | grep -oE "ey[a-zA-Z0-9+/=_.-]+" | head -n 1 || echo "$CF_TOKEN" | tr -d '[:space:]')
          
          # SAFE DEBUG: Verify integrity without leaking secret
          echo "DEBUG: Token Length is ${#CLEAN_TOKEN}"
          echo "DEBUG: Token starts with ${CLEAN_TOKEN:0:8}..."
          echo "DEBUG: Token ends with ...${CLEAN_TOKEN: -8}"
          
          # Create dedicated tunnel env file
          printf "TUNNEL_TOKEN=%s\n" "$CLEAN_TOKEN" > .env.tunnel
          # Keep root .env for compatibility
          printf "CF_TOKEN=%s\n" "$CLEAN_TOKEN" > .env
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}


      - name: Build Frontend
        run: |
          docker compose build frontend

      - name: Build Backend
        run: |
          docker compose build backend

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env files
        run: |
          echo "$FRONTEND_ENV" > frontend/.env
          echo "$BACKEND_ENV" > backend/.env
          # 🚀 CLEAN & EXTRACT TOKEN
          CLEAN_TOKEN=$(echo "$CF_TOKEN" | grep -oE "ey[a-zA-Z0-9+/=_.-]+" | head -n 1 || echo "$CF_TOKEN" | tr -d '[:space:]')
          
          # SAFE DEBUG: Verify integrity without leaking secret
          echo "DEBUG: Token Length is ${#CLEAN_TOKEN}"
          echo "DEBUG: Token starts with ${CLEAN_TOKEN:0:8}..."
          echo "DEBUG: Token ends with ...${CLEAN_TOKEN: -8}"
          
          # Create dedicated tunnel env file
          printf "TUNNEL_TOKEN=%s\n" "$CLEAN_TOKEN" > .env.tunnel
          # Keep root .env for compatibility
          printf "CF_TOKEN=%s\n" "$CLEAN_TOKEN" > .env
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}

      - name: Deploy
        run: |
          docker compose up -d --build --remove-orphans
          docker image prune -f
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
