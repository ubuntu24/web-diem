name: WEB DIEM - K3s Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm install
          npm run test
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Run Backend Tests
        run: |
          cd backend
          pip install -r requirements.txt
          python3 -m pytest

  build-and-deploy:
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
      packages: write
    env:
      KUBECONFIG: /home/ubuntu/.kube/config
      BACKEND_IMAGE: ghcr.io/${{ github.repository }}/web-diem-backend:${{ github.sha }}
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/web-diem-frontend:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ─── BƯỚC 1: Tạo file .env cho quá trình build ───────────────────────────
      - name: Create .env files for build
        run: |
          # Reassure user and proceed safely
          echo "=== Tạo file .env an toàn ==="
          
          # Tạo file ở thư mục gốc (nơi vừa test touch thành công)
          cat << 'EOF' > temp_frontend_env
          ${{ secrets.FRONTEND_ENV }}
          EOF
          
          cat << 'EOF' > temp_backend_env
          ${{ secrets.BACKEND_ENV }}
          EOF
          
          # Move vào thư mục đích
          mkdir -p frontend backend
          mv temp_frontend_env frontend/.env
          mv temp_backend_env backend/.env
          
          # Ghi tiếp các biến khác
          [ -n "${{ secrets.REDIS_URL }}" ]             && echo "REDIS_URL=${{ secrets.REDIS_URL }}"                       >> backend/.env
          [ -n "${{ secrets.DATABASE_URL }}" ]          && echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"                 >> backend/.env
          [ -n "${{ secrets.ADMIN_PASSWORD }}" ]        && echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"             >> backend/.env
          [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]    && echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"     >> backend/.env
          [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]      && echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"         >> backend/.env
          [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]    && echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"     >> frontend/.env
          [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]      && echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"         >> frontend/.env
          
          echo "=== Tạo file .env thành công ==="

      # ─── BƯỚC 2: Login vào GitHub Container Registry ─────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── BƯỚC 3: Build & Push Docker images lên GHCR ───────────────────────
      - name: Build and Push Backend image
        run: |
          docker build --pull -t "$BACKEND_IMAGE" ./backend
          docker push "$BACKEND_IMAGE"

      - name: Build and Push Frontend image
        run: |
          docker build --pull -t "$FRONTEND_IMAGE" --build-arg API_URL=http://backend:8000 ./frontend
          docker push "$FRONTEND_IMAGE"
          
          # Dọn dẹp ảnh Docker cũ trên runner để tiết kiệm disk
          docker image prune -a -f --filter "until=24h"

      # ─── BƯỚC 4: Tạo/Cập nhật K8s Secrets từ GitHub Secrets ─────────────────
      - name: Apply K8s Secrets
        run: |
          set -euo pipefail
          # Secret cho backend (đọc toàn bộ file .env)
          kubectl create secret generic backend-env \
            --from-env-file=backend/.env \
            --dry-run=client -o yaml | kubectl apply -f -

          # Secret cho frontend
          kubectl create secret generic frontend-env \
            --from-env-file=frontend/.env \
            --dry-run=client -o yaml | kubectl apply -f -

          # Secret cho GHCR (để K3s có thể tải ảnh từ GitHub về)
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Secret cho Cloudflare Tunnel Token
          CLEAN_TOKEN=$(echo "$CF_TOKEN" | grep -oE "ey[a-zA-Z0-9+/=_.-]+" | head -n 1 || echo "$CF_TOKEN" | tr -d '[:space:]')
          kubectl create secret generic cloudflared-secret \
            --from-literal=TUNNEL_TOKEN="$CLEAN_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}

      # ─── BƯỚC 5: Áp dụng cấu hình K3s ───────────────────────────────────────
      - name: Apply K3s manifests
        run: |
          set -euo pipefail
          sed \
            -e "s|web-diem-backend:latest|$BACKEND_IMAGE|g" \
            -e "s|web-diem-frontend:latest|$FRONTEND_IMAGE|g" \
            k8s/lifesuck-single-node.yaml | kubectl apply -f -

      # ─── BƯỚC 6: Restart Cloudflared để nạp token/env mới ───────────────────
      - name: Rollout restart deployments
        run: |
          set -euo pipefail
          kubectl rollout restart deployment/cloudflared

      # ─── BƯỚC 7: Chờ và xác nhận deploy thành công ───────────────────────────
      - name: Wait for deployments to be ready
        run: |
          set -euo pipefail
          kubectl rollout status deployment/backend  --timeout=180s
          kubectl rollout status deployment/frontend --timeout=180s
          kubectl rollout status deployment/cloudflared --timeout=90s

      # ─── BƯỚC 8: In trạng thái cuối cùng ────────────────────────────────────
      - name: Show pod status
        run: kubectl get pods -o wide
