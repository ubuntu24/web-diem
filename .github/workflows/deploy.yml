name: WEB DIEM - K3s Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ─── BƯỚC 1: Tạo file .env cho quá trình build ───────────────────────────
      - name: Create .env files for build
        run: |
          # Dùng lại cách ghi file thông thường, không dùng sudo
          echo "$FRONTEND_ENV" > frontend/.env
          echo "$BACKEND_ENV" > backend/.env
          
          # Ghi từng biến vào backend/.env
          [ -n "$REDIS_URL" ]             && echo "REDIS_URL=$REDIS_URL"                       >> backend/.env
          [ -n "$DATABASE_URL" ]          && echo "DATABASE_URL=$DATABASE_URL"                 >> backend/.env
          [ -n "$ADMIN_PASSWORD" ]        && echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"             >> backend/.env
          [ -n "$TELEGRAM_BOT_TOKEN" ]    && echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"     >> backend/.env
          [ -n "$TELEGRAM_CHAT_ID" ]      && echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"         >> backend/.env
          # Ghi thêm telegram vào frontend nếu cần
          [ -n "$TELEGRAM_BOT_TOKEN" ]    && echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"     >> frontend/.env
          [ -n "$TELEGRAM_CHAT_ID" ]      && echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"         >> frontend/.env
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ─── BƯỚC 2: Build Docker images ─────────────────────────────────────────
      - name: Build Backend image
        run: docker build -t web-diem-backend:latest ./backend

      - name: Build Frontend image
        run: docker build -t web-diem-frontend:latest --build-arg API_URL=http://backend:8000 ./frontend

      # ─── BƯỚC 3: Nạp ảnh vào K3s (containerd) ────────────────────────────────
      - name: Import images into K3s containerd
        run: |
          docker save web-diem-backend:latest  | sudo k3s ctr images import -
          docker save web-diem-frontend:latest | sudo k3s ctr images import -
          # Dọn dẹp ảnh Docker cũ để tiết kiệm disk
          docker image prune -a -f --filter "until=24h"

      # ─── BƯỚC 4: Tạo/Cập nhật K8s Secrets từ GitHub Secrets ─────────────────
      - name: Apply K8s Secrets
        run: |
          # Secret cho backend (đọc toàn bộ file .env)
          kubectl create secret generic backend-env \
            --from-env-file=backend/.env \
            --dry-run=client -o yaml | kubectl apply -f -

          # Secret cho frontend
          kubectl create secret generic frontend-env \
            --from-env-file=frontend/.env \
            --dry-run=client -o yaml | kubectl apply -f -

          # Secret cho Cloudflare Tunnel Token
          CLEAN_TOKEN=$(echo "$CF_TOKEN" | grep -oE "ey[a-zA-Z0-9+/=_.-]+" | head -n 1 || echo "$CF_TOKEN" | tr -d '[:space:]')
          kubectl create secret generic cloudflared-secret \
            --from-literal=TUNNEL_TOKEN="$CLEAN_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}

      # ─── BƯỚC 5: Áp dụng cấu hình K3s ───────────────────────────────────────
      - name: Apply K3s manifests
        run: kubectl apply -f k8s/lifesuck-single-node.yaml

      # ─── BƯỚC 6: Rollout restart để K3s dùng ảnh mới nhất ───────────────────
      - name: Rollout restart deployments
        run: |
          kubectl rollout restart deployment/backend
          kubectl rollout restart deployment/frontend
          kubectl rollout restart deployment/cloudflared

      # ─── BƯỚC 7: Chờ và xác nhận deploy thành công ───────────────────────────
      - name: Wait for deployments to be ready
        run: |
          kubectl rollout status deployment/backend  --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/cloudflared --timeout=60s

      # ─── BƯỚC 8: In trạng thái cuối cùng ────────────────────────────────────
      - name: Show pod status
        run: kubectl get pods -o wide
